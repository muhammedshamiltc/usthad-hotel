<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Food Munch - Login</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" />
    <link href="https://fonts.googleapis.com/css2?family=Manjari&display=swap" rel="stylesheet">
    <script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/popper.js@1.16.1/dist/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #183b56 0%, #0d2436 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Roboto', sans-serif;
            padding: 30px 15px;
        }
        .page-wrapper {
            display: flex;
            width: 100%;
            max-width: 850px;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .left-panel {
    background: linear-gradient(135deg, #003d40 0%, #006b70 30%, #00b4bb 65%, #00d4cc 100%);
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 40px;
    color: white;
    position: relative;
    overflow: hidden;
}
.left-panel::before {
    content: '';
    position: absolute;
    top: -50%;
    left: -50%;
    width: 200%;
    height: 200%;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.08;
    pointer-events: none;
    z-index: 1;
}
.left-panel img,
.left-panel h1,
.left-panel p,
.left-panel div {
    position: relative;
    z-index: 2;
}
.welcome-back {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 12px;
    padding: 20px 25px;
    text-align: center;
    width: 100%;
}
        
        .left-panel img { width: 90px; margin-bottom: 20px; }
        .left-panel h1 { font-size: 32px; font-weight: 800; margin-bottom: 10px; }
        .left-panel p { font-size: 16px; opacity: 0.9; text-align: center; margin-bottom: 30px; }
        .welcome-back {
            background: rgba(255,255,255,0.2);
            border-radius: 12px;
            padding: 20px 25px;
            text-align: center;
            width: 100%;
        }
        .welcome-back h3 { font-size: 20px; font-weight: 700; margin-bottom: 6px; }
        .welcome-back p { font-size: 14px; opacity: 0.9; margin: 0; }
        .right-panel {
            background: white;
            flex: 1;
            padding: 60px 45px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        .form-title { color: #183b56; font-size: 28px; font-weight: 800; margin-bottom: 6px; }
        .form-subtitle { color: #7b8794; font-size: 14px; margin-bottom: 30px; }
        .form-label { color: #183b56; font-weight: 600; font-size: 13px; margin-bottom: 5px; display: block; }
        .form-control {
            border-radius: 8px;
            border: 1.5px solid #e0e0e0;
            padding: 12px 14px;
            font-size: 15px;
            width: 100%;
            margin-bottom: 18px;
            transition: border-color 0.2s;
        }
        .form-control:focus { border-color: #d0b200; outline: none; box-shadow: 0 0 0 3px rgba(208,178,0,0.15); }
        .submit-btn {
            background: linear-gradient(135deg, #003d40 0%, #006b70 50%, #00b4bb 100%);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 13px;
            font-size: 16px;
            font-weight: 700;
            width: 100%;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .submit-btn:hover { opacity: 0.88; }
        .bottom-link { text-align: center; margin-top: 18px; color: #7b8794; font-size: 14px; }
        .bottom-link a { color: #d0b200; font-weight: 700; text-decoration: none; }
        .bottom-link a:hover { text-decoration: underline; }
        .msg-box { text-align: center; font-size: 14px; font-weight: 600; margin-top: 12px; min-height: 20px; }
        @media (max-width: 700px) {
            .left-panel { display: none; }
            .right-panel { padding: 35px 25px; }
        }
    </style>
</head>
<body>
    <div class="page-wrapper">
        <div class="left-panel">
            <img src="/static/logo.png" style="width:200px; height:auto;" />
            <h1>
    <span style="font-family: 'Manjari', sans-serif; font-size: 36px; font-weight: bold; color: red;">
        ഉസ്താദ്
    </span>
    <span style="font-family:  sans-serif; font-size: 32px; font-weight: bold; color: black;">
        HOTEL
    </span>
</h1>
            <p>Your favourite food is just a few clicks away!</p>
            <div class="welcome-back">
                <h3>👋 Welcome Back!</h3>
                <p>Login to browse the menu and place your order</p>
            </div>
        </div>
        <div class="right-panel">
            <h2 class="form-title">Login</h2>
            <p class="form-subtitle">Enter your credentials to access your account</p>
            <label class="form-label">Email Address</label>
            <input type="email" class="form-control" id="email" placeholder="your@email.com" />
            <label class="form-label">Password</label>
            <input type="password" class="form-control" id="password" placeholder="Enter your password" />
            <button class="submit-btn" onclick="login()">Login to My Account</button>
            <div id="msg" class="msg-box"></div>
            <div class="bottom-link">Don't have an account? <a href="/signup">Sign up here</a></div>
        </div>
    </div>

    <script>
        function login() {
            const email = document.getElementById('email').value.trim();
            const password = document.getElementById('password').value.trim();
            const msg = document.getElementById('msg');

            if (!email || !password) {
                msg.style.color = '#b00020'; msg.innerText = '❌ Please enter email and password!'; return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ email, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    msg.style.color = '#1a7a3c';
                    msg.innerText = '✅ Login successful! Redirecting...';
                    setTimeout(() => window.location.href = '/', 1200);
                } else {
                    msg.style.color = '#b00020';
                    msg.innerText = '❌ ' + data.message;
                }
            });
        }
    </script>
</body>
</html>
